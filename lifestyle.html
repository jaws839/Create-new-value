  <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070A;--surface:rgba(255,255,255,0.045);--border:rgba(255,255,255,0.08);
  --gold:#C8A96B;--gold-dim:#9a7d4f;--text:#F5F5F7;--muted:#888;
  --green:#4caf92;--blur:28px;--radius:16px
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:200;background:rgba(7,7,10,.92);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:.85rem 1.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.nav-logo{font-size:1.35rem;font-weight:700;color:var(--gold);letter-spacing:.1em;margin-right:auto}
.nav-links{display:flex;gap:.4rem;flex-wrap:wrap}
.nav-links a{padding:.35rem .85rem;border-radius:100px;font-size:.78rem;
  border:1px solid var(--border);transition:.2s;color:var(--muted)}
.nav-links a:hover,.nav-links a.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.nav-cart-btn{background:none;border:1px solid var(--border);color:var(--text);
  border-radius:100px;padding:.35rem .85rem;font-size:.78rem;cursor:pointer;
  transition:.2s;white-space:nowrap;font-family:inherit}
.nav-cart-btn:hover{border-color:var(--gold);color:var(--gold)}
.nav-cart-btn.has-items{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}

/* ── HERO ── */
.hero{text-align:center;padding:3.5rem 1.5rem 2.5rem;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(200,169,107,.1),transparent)}
.hero-badge{display:inline-block;border:1px solid var(--gold);color:var(--gold);
  font-size:.7rem;padding:.28rem .85rem;border-radius:100px;letter-spacing:.12em;margin-bottom:1.1rem}
.hero h1{font-size:clamp(1.7rem,4.5vw,3rem);font-weight:700;line-height:1.2;margin-bottom:.7rem}
.hero h1 span{color:var(--gold)}
.hero p{color:var(--muted);font-size:.9rem;max-width:460px;margin:0 auto 2rem}
.hero-stats{display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap}
.stat-num{font-size:1.55rem;font-weight:700;color:var(--gold)}
.stat-label{font-size:.7rem;color:var(--muted);margin-top:.2rem}

/* ── SEARCH + FILTER BAR ── */
.filter-bar{background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);
  padding:1rem 1.5rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;
  position:sticky;top:57px;z-index:150;backdrop-filter:blur(16px)}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:100px;padding:.5rem 1rem .5rem 2.2rem;color:var(--text);font-size:.85rem;
  outline:none;font-family:inherit;transition:.2s}
.search-wrap input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
.filter-group{display:flex;gap:.4rem;flex-wrap:wrap}
.filter-chip{background:var(--surface);border:1px solid var(--border);color:var(--muted);
  border-radius:100px;padding:.35rem .8rem;font-size:.75rem;cursor:pointer;transition:.2s;
  white-space:nowrap;font-family:inherit}
.filter-chip:hover{border-color:var(--gold-dim);color:var(--text)}
.filter-chip.active{background:rgba(200,169,107,.15);border-color:var(--gold);color:var(--gold);font-weight:600}
.sort-select{background:var(--surface);border:1px solid var(--border);color:var(--muted);
  border-radius:100px;padding:.35rem .8rem;font-size:.75rem;cursor:pointer;
  outline:none;font-family:inherit}
.result-count{font-size:.78rem;color:var(--muted);margin-left:auto;white-space:nowrap}

/* ── PRODUCT GRID ── */
.section{padding:2rem 1.5rem 3rem;max-width:1240px;margin:0 auto}
.section-title{font-size:1rem;font-weight:700;letter-spacing:.05em;color:var(--gold);
  text-transform:uppercase;margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.9rem}

/* ── PRODUCT CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:.25s;cursor:pointer;position:relative}
.card:hover{transform:translateY(-5px);border-color:var(--gold-dim);
  box-shadow:0 10px 36px rgba(200,169,107,.14)}
.card-img-wrap{position:relative;aspect-ratio:1;overflow:hidden;background:#111}
.card-img{width:100%;height:100%;object-fit:cover;display:block;transition:.35s}
.card:hover .card-img{transform:scale(1.06)}
.card-badge{position:absolute;top:.6rem;left:.6rem;background:var(--gold);color:#000;
  font-size:.63rem;font-weight:700;padding:.18rem .52rem;border-radius:100px;letter-spacing:.05em;z-index:1}
.card-body{padding:.85rem}
.card-name{font-size:.82rem;font-weight:500;line-height:1.35;margin-bottom:.45rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-price{font-size:.98rem;font-weight:700;color:var(--gold)}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:.4rem}
.card-margin{font-size:.68rem;color:var(--green);font-weight:700}
.card-rating{font-size:.68rem;color:var(--muted)}
.card-btn{width:100%;margin-top:.65rem;background:rgba(200,169,107,.12);border:1px solid var(--gold-dim);
  color:var(--gold);border-radius:8px;padding:.45rem;font-size:.78rem;font-weight:600;
  cursor:pointer;transition:.2s;font-family:inherit}
.card-btn:hover{background:var(--gold);color:#000}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 100%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.skel-img{aspect-ratio:1;width:100%}
.skel-body{padding:.85rem;display:flex;flex-direction:column;gap:.5rem}
.skel-line{height:.7rem;border-radius:4px}
.skel-line.w70{width:70%}.skel-line.w50{width:50%}.skel-line.w30{width:30%}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:5rem 1.5rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:1rem}
.empty p{font-size:.9rem}

/* ── CART SIDEBAR ── */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:300;opacity:0;pointer-events:none;transition:.3s;backdrop-filter:blur(4px)}
.sidebar-overlay.open{opacity:1;pointer-events:all}
.cart-sidebar{position:fixed;right:0;top:0;bottom:0;width:min(380px,100vw);
  background:#111;border-left:1px solid var(--border);z-index:400;
  transform:translateX(100%);transition:.3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column}
.cart-sidebar.open{transform:translateX(0)}
.cart-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center}
.cart-header h3{font-size:1rem;font-weight:700}
.cart-close{background:none;border:none;color:var(--muted);font-size:1.3rem;
  cursor:pointer;padding:.2rem .4rem;border-radius:6px;transition:.2s}
.cart-close:hover{color:var(--text);background:var(--surface)}
.cart-items{flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:.8rem}
.cart-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:.85rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.cart-item-name{font-size:.82rem;flex:1;line-height:1.3}
.cart-item-price{font-size:.85rem;font-weight:700;color:var(--gold);white-space:nowrap}
.cart-item-del{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:.85rem;padding:.2rem .4rem;border-radius:6px;transition:.2s}
.cart-item-del:hover{color:#e57373;background:rgba(229,115,115,.1)}
.cart-empty{text-align:center;color:var(--muted);padding:3rem 0;font-size:.88rem}
.cart-footer{padding:1.2rem 1.5rem;border-top:1px solid var(--border)}
.cart-total{display:flex;justify-content:space-between;margin-bottom:1rem;font-size:.9rem}
.cart-total-price{font-weight:700;color:var(--gold)}
.cart-checkout{width:100%;background:var(--gold);color:#000;border:none;border-radius:12px;
  padding:.85rem;font-size:.9rem;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.cart-checkout:hover{background:#d4b478}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;right:1.5rem;background:rgba(20,20,24,.96);
  border:1px solid var(--gold);color:var(--text);
  padding:.65rem 1.1rem;border-radius:12px;font-size:.82rem;
  transform:translateY(120px);opacity:0;transition:.3s cubic-bezier(.4,0,.2,1);z-index:500}
.toast.show{transform:translateY(0);opacity:1}

/* ── PWA INSTALL BANNER ── */
.pwa-banner{display:none;position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);
  background:rgba(20,20,24,.96);border:1px solid var(--gold);border-radius:16px;
  padding:.9rem 1.4rem;gap:.9rem;align-items:center;z-index:500;max-width:380px;width:90%}
.pwa-banner.visible{display:flex}
.pwa-banner-text{font-size:.82rem;flex:1;line-height:1.4}
.pwa-banner-text strong{color:var(--gold);display:block;margin-bottom:.15rem}
.pwa-install-btn{background:var(--gold);color:#000;border:none;border-radius:8px;
  padding:.45rem .85rem;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.pwa-banner-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.1rem .3rem}

/* ── CAT GRID (index only) ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.1rem}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:2rem;text-align:center;transition:.25s;cursor:pointer}
.cat-card:hover{border-color:var(--gold);transform:translateY(-3px);background:rgba(200,169,107,.06)}
.cat-icon{font-size:2.4rem;margin-bottom:.75rem}
.cat-name{font-size:1.05rem;font-weight:700;margin-bottom:.3rem}
.cat-count{font-size:.78rem;color:var(--muted)}
.cat-margin{font-size:.78rem;color:var(--green);font-weight:600;margin-top:.3rem}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:2rem 1.5rem;text-align:center;
  color:var(--muted);font-size:.78rem}
footer .footer-logo{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:.4rem}

@media(max-width:600px){
  .card-grid{grid-template-columns:repeat(2,1fr);gap:.6rem}
  .cat-grid{grid-template-columns:1fr 1fr}
  .filter-bar{top:52px;gap:.5rem}
  nav{padding:.7rem 1rem}
  .section{padding:1.5rem 1rem 2.5rem}
}

// ── CART ──
let cart = JSON.parse(sessionStorage.getItem('miru_cart')||'[]');

function openCart(){
  document.getElementById('cartSidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  renderCartItems();
}
function closeCart(){
  document.getElementById('cartSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
function renderCartItems(){
  const el = document.getElementById('cartItems');
  const footerEl = document.getElementById('cartFooter');
  if(!cart.length){
    el.innerHTML='<div class="cart-empty">🛒 장바구니가 비어있습니다</div>';
    if(footerEl) footerEl.style.display='none';
    return;
  }
  if(footerEl) footerEl.style.display='block';
  const total = cart.reduce((s,i)=>s+i.price,0);
  el.innerHTML = cart.map((item,i)=>`
    <div class="cart-item">
      <div class="cart-item-name">${item.name}</div>
      <div class="cart-item-price">₩${item.price.toLocaleString()}</div>
      <button class="cart-item-del" onclick="removeCart(${i})" title="삭제">✕</button>
    </div>`).join('');
  document.getElementById('cartTotalPrice').textContent='₩'+total.toLocaleString();
}
function removeCart(i){
  cart.splice(i,1);
  sessionStorage.setItem('miru_cart',JSON.stringify(cart));
  updateCartNav();
  renderCartItems();
}
function addToCart(name,price){
  cart.push({name,price});
  sessionStorage.setItem('miru_cart',JSON.stringify(cart));
  updateCartNav();
  showToast('🛒 장바구니에 담겼습니다');
}
function updateCartNav(){
  const btn = document.getElementById('navCartBtn');
  if(!btn) return;
  if(cart.length){
    btn.textContent='🛒 '+cart.length+'개';
    btn.classList.add('has-items');
  } else {
    btn.textContent='🛒 장바구니';
    btn.classList.remove('has-items');
  }
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── SKELETON → PRODUCTS ──
function hideSkeleton(){
  document.querySelectorAll('.skel-card').forEach(el=>el.remove());
  document.getElementById('productGrid').style.display='grid';
}

// ── PWA INSTALL ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  const banner=document.getElementById('pwaBanner');
  if(banner) banner.classList.add('visible');
});
function installPWA(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});
  document.getElementById('pwaBanner').classList.remove('visible');
}
function dismissPWA(){
  document.getElementById('pwaBanner').classList.remove('visible');
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  updateCartNav();
  setTimeout(hideSkeleton, 600);
});


// ── SEARCH + FILTER ──
let allProducts = window.__PRODUCTS__ || [];
let activePrice = 'all';
let activeMargin = 'all';
let activeSort = 'default';
let searchQuery = '';

const priceRanges = {
  all: ()=>true,
  u20: p=>p.price<20000,
  u50: p=>p.price>=20000&&p.price<50000,
  o50: p=>p.price>=50000
};
const marginRanges = {
  all: ()=>true,
  m30: p=>p.margin>=30,
  m40: p=>p.margin>=40,
  m45: p=>p.margin>=45
};
const sorters = {
  default: (a,b)=>0,
  price_asc: (a,b)=>a.price-b.price,
  price_desc: (a,b)=>b.price-a.price,
  margin: (a,b)=>b.margin-a.margin,
  rating: (a,b)=>b.rating-a.rating
};

function applyFilters(){
  let res = allProducts.filter(p=>{
    const q = searchQuery.trim().toLowerCase();
    return (!q || p.name.toLowerCase().includes(q)) &&
           priceRanges[activePrice](p) &&
           marginRanges[activeMargin](p);
  });
  res.sort(sorters[activeSort]);

  const grid = document.getElementById('productGrid');
  const cnt  = document.getElementById('resultCount');
  if(cnt) cnt.textContent = res.length+'개';

  if(!res.length){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>검색 결과가 없습니다</p></div>';
    return;
  }
  grid.innerHTML = res.map(p=>{
    const badge = p.badge ? `<span class="card-badge">${p.badge}</span>` : '';
    return `<div class="card" onclick="location.href='product-${p.slug||p.id}.html'" >
      ${badge}
      <div class="card-img-wrap">
        <img class="card-img" src="${p.image}" alt="${p.name}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">₩${p.price.toLocaleString()}</div>
        <div class="card-meta">
          <span class="card-margin">마진 ${p.margin}%</span>
          <span class="card-rating">⭐ ${p.rating}</span>
        </div>
        <button class="card-btn" onclick="event.stopPropagation();addToCart('${p.name.replace(/'/g,"\'")}',${p.price})">장바구니 담기</button>
      </div>
    </div>`;
  }).join('');
}

function setPrice(v,el){
  activePrice=v;
  document.querySelectorAll('.fp').forEach(e=>e.classList.remove('active'));
  el.classList.add('active'); applyFilters();
}
function setMargin(v,el){
  activeMargin=v;
  document.querySelectorAll('.fm').forEach(e=>e.classList.remove('active'));
  el.classList.add('active'); applyFilters();
}
function setSort(v){ activeSort=v; applyFilters(); }
function setSearch(v){ searchQuery=v; applyFilters(); }

document.addEventListener('DOMContentLoaded',()=>{
  updateCartNav();
  applyFilters();
});

</script>
</body>
